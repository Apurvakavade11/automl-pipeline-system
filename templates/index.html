<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoML Pipeline System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .hero-section {
            padding: 100px 0;
            color: white;
        }
        .card {
            border-radius: 15px;
            transition: transform 0.3s;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-10px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero-section text-center">
            <h1 class="display-4 mb-4">
                <i class="fas fa-robot"></i> AutoML Pipeline System
            </h1>
            <p class="lead mb-5">Automated Machine Learning made easy. Train, evaluate, and deploy models without writing code.</p>
            
            <div class="row mt-5">
                <div class="col-md-6 mb-3">
                    <div class="card">
                        <div class="card-body text-center p-5">
                            <i class="fas fa-sign-in-alt fa-4x mb-3 text-primary"></i>
                            <h4>Login</h4>
                            <p>Access your account</p>
                            <a href="/login" class="btn btn-primary">Login</a>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <div class="card">
                        <div class="card-body text-center p-5">
                            <i class="fas fa-user-plus fa-4x mb-3 text-success"></i>
                            <h4>Register</h4>
                            <p>Create new account</p>
                            <a href="/register" class="btn btn-success">Register</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
